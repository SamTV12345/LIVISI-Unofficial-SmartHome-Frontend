# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
#
# Grouping strategy:
#   * <eco>-minor-patch  -> batches minor/patch *version* updates into one PR.
#   * <eco>-security      -> batches *security* updates into one PR (applies-to
#                            security-updates). Security fixes ship together
#                            regardless of semver bump.
#   Major version updates are intentionally left ungrouped so a breaking major
#   lands as its own PR and can't block an otherwise-mergeable batch.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
    groups:
      mobile-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      mobile-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/ui-new"
    schedule:
      interval: "weekly"
    groups:
      ui-new-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      ui-new-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/api"
    schedule:
      interval: "weekly"
    groups:
      api-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      api-security:
        applies-to: security-updates
        patterns:
          - "*"
