name: Build release binaries

on:
    push:
        branches:
        - master
        - main

jobs:
  release-windows:
    name: release x86_64-pc-windows-gnu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: ui-new/pnpm-lock.yaml
      - name: "Create frontend"
        working-directory: ui-new
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
          pnpm run test:browser
          pnpm run build:copy
      - name: Compile
        working-directory: api
        run: |
            sudo apt-get update
            sudo apt-get install -y gcc-multilib mingw-w64 gcc-mingw-w64-x86-64
            rustup target add x86_64-pc-windows-gnu
            cargo build --release --target x86_64-pc-windows-gnu
      - name: Archive
        working-directory: api
        run: |
          mkdir -p dist
          ls -lisa target/x86_64-pc-windows-gnu/release
          mv target/x86_64-pc-windows-gnu/release/api* dist/
          mkdir dist/static
          cp -r static/* dist/static/
          cp -r ../run.bat dist/
          cd dist
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
           path: api/dist
           name: app-x86_64-pc-windows-gnu
