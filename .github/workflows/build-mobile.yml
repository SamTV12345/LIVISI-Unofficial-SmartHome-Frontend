on:
  push:


jobs:
  build-expo:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      ANDROID_APPLICATION_ID: "com.samtv12345.smarthome"
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: mobile/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: mobile
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: mobile
        run: pnpm dlx eas-cli@latest build --profile production --platform android --local
      - name: Rename artifact
        working-directory: mobile
        run: mv *.aab app-release.aab
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: mobile/app-release.aab
          name: android-aab
