name: Build Mobile APK

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-expo:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      ANDROID_APPLICATION_ID: "com.samtv12345.smarthome"
      EXPO_USE_COMMUNITY_AUTOLINKING: "0"
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: mobile/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: mobile
        run: pnpm install --frozen-lockfile
      - name: Generate native code with expo prebuild
        run: npx expo prebuild --platform android
        working-directory: mobile
      - name: Generate unsigned APK
        working-directory: mobile
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: mobile/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{steps.sign_app.outputs.signedReleaseFile}}
