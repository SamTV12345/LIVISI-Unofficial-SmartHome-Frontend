name: Build Mobile APK

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-expo:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      ANDROID_APPLICATION_ID: "com.samtv12345.smarthome"
      EXPO_USE_COMMUNITY_AUTOLINKING: "0"
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: mobile/pnpm-lock.yaml
      - name: Set package version from tag
        working-directory: mobile
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const packagePath = "package.json";
          const appConfigPath = "app.json";
          const tag = process.env.GITHUB_REF_NAME || "";
          const version = tag.replace(/^v/, "");
          const semverPattern = /^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/;

          if (!semverPattern.test(version)) {
            throw new Error(`Tag '${tag}' does not resolve to a valid semver version.`);
          }

          const packageJson = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          packageJson.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`, "utf8");
          console.log(`Set ${packagePath} version to ${version}`);

          const appJson = JSON.parse(fs.readFileSync(appConfigPath, "utf8"));
          if (!appJson.expo || typeof appJson.expo !== "object") {
            throw new Error(`${appConfigPath} does not contain an 'expo' object.`);
          }
          appJson.expo.version = version;
          fs.writeFileSync(appConfigPath, `${JSON.stringify(appJson, null, 2)}\n`, "utf8");
          console.log(`Set ${appConfigPath} expo.version to ${version}`);
          NODE
      - name: Install dependencies
        working-directory: mobile
        run: pnpm install --frozen-lockfile
      - name: Generate native code with expo prebuild
        run: npx expo prebuild --platform android
        working-directory: mobile
      - name: Generate unsigned APK
        working-directory: mobile
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Install Android Build Tools for signing
        run: sdkmanager "build-tools;29.0.3"
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: mobile/android/app/build/outputs/apk/release
          buildToolsVersion: "29.0.3"
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{steps.sign_app.outputs.signedReleaseFile}}
