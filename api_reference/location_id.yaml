paths:
  location:
    get:
      tags:
        - Location
      summary: Retrieves one or multiple locations
      description: |
        The interface returns one or many location entities connected to
        the concerned SmartHome controller. Optionally, the retrieval can be restricted
        to a certain tag by specifying the key of the tag and the corresponding tag value. When using this interface without a parameter, the interface response can grow large, since it will include a full list of all attached locations to a controller. Parameter values has to be URL encoded. 

        __Required access rights__:
        * __User:__ (LocationRead | LocationFull) & ControllerAccess 
        * __Client:__ CoreRead | CoreFull
      operationId: getLocation
      parameters:
        - name: tkey
          in: query
          description:
            Key of the location tag relevant for the search. In case this parameter
            is specified also the value for the tag must be provided
          schema:
            type: string
        - name: tval
          in: query
          description: Value of the location tag, which should be considered for the query
          schema:
            type: string
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/location"
              example:
                - id: 9406ee98cb7d4280be9f41f62b4cdd0b
                  config:
                    name: Wohnzimmer
                    type: Livingroom
    post:
      tags:
        - Location
      summary: Stores a location in the SmartHome configuration
      description: "__IMPORTANT__: No other requests that needs exclusive access to the configuration should be sent until one of the above notification is received since the system will reject such requests"
      operationId: postLocation
      requestBody:
        description: The location entity to be created
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/location"
            example:
              $ref: "#/components/examples/locationExample/value"
      responses:
        200:
          description: The request has been received and validated (acknowledge response), but it doesnâ€™t mean that the result was successful. The 200 OK request response will always be followed by an event received through the websocket connection containing the actual result state (detailed)
        400:
          description: If the location is not valid from the attributes point of view (missing required attributes, invalid types) the 3001 error code is retrieved. If the location has missing or wrong values for a specific property of that location instance the 1005 error code is retrieved.
  location_id:
    parameters:
      - name: id
        in: path
        description: ID of the referred location
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Location
      summary: Find location by ID
      description: The location with the location id {id} is returned.
      operationId: getLocationById
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/location"
              example:
                $ref: "#/components/examples/locationExample/value"
        400:
          description: Invalid ID supplied
          content: {}
        404:
          description: Location not found
          content: {}
    delete:
      tags:
        - Location
      summary: Deletes a location from the SmartHome configuration
      description: "__IMPORTANT__: No other requests that needs exclusive access to the configuration should be sent until one of the above notification is received since the system will reject such requests"
      operationId: deleteLocation
      responses:
        200:
          description: The request has been received and validated (acknowledge response), but it doesnâ€™t mean that the result was successful. The 200 OK request response will always be followed by an event received through the websocket connection containing the actual result state (detailed)
        400:
          description: Invalid ID supplied
        404:
          description: Location not found
    put:
      tags:
        - Location
      summary: Updates a location in the SmartHome configuration
      description: |
        Usage of the PUT Location interface should follow the next process:
          1.  Use GET Location interface to obtain a location entity
          2.  Update the desired location properties of the entity obtained in step 1
          3.  Use PUT Location with the result from step 2 in the body of the request
      operationId: updateLocation
      requestBody:
        description: |
          Location entity to be updated

          __IMPORTANT:__ The body of the request is mandatory to be a full location entity, containing both updated and unchanged properties. PUT location should work only with entities obtained through the GET location interface.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/location"
            example:
              $ref: "#/components/examples/locationExample/value"
        required: true
      responses:
        200:
          description: The request has been received and validated (acknowledge response), but it doesnâ€™t mean that the result was successful. The 200 OK request response will always be followed by an event received through the websocket connection containing the actual result state (detailed).
        400:
          description: If the location is not valid from the attributes point of view (missing required attributes, invalid types) the 3001 error code is retrieved. If the location has missing or wrong values for a specific property of that location instance the 1005 error code is retrieved.
components:
  schemas:
    location:
      type: object
      description: The Location entity provides information regarding the physical location of entities. In the current model, it can be assigned to devices and capabilities.
      properties:
        id:
          type: string
          readOnly: true
          description: Identifier of the location â€“ must be unique.
        config:
          type: object
          description: The configuration container includes a set of parameters for describing the location.
        tags:
          type: object
          description: Container for tagging the location, e.g. if the location is on a certain floor in the house
          additionalProperties:
            type: string
      required:
        - id
        - config
  examples:
    locationExample:
      value:
        id: 9406ee98cb7d4280be9f41f62b4cdd0b
        config:
          name: Wohnzimmer
          type: Livingroom
        tags:
          floor: Ground Floor
