paths:
  device:
    get:
      tags:
        - Device
      summary: Retrieves one or multiple devices
      description: |
        The interface returns one or many device entities connected to
        the concerned SmartHome controller. Optionally, the retrieval can be restricted
        to a certain tag by specifying the key of the tag and the corresponding tag value. When using this interface without a parameter, the interface response can grow large, since it will include a full list of all attached devices to a controller. Parameter values has to be URL encoded. 

        __Required access rights__:
        * __User:__ (DeviceRead | DeviceFull) & ControllerAccess 
        * __Client:__ CoreRead | CoreFull
      operationId: getDevice
      parameters:
        - name: tkey
          in: query
          description:
            Key of the device tag relevant for the search. In case this parameter
            is specified also the value for the tag must be provided
          schema:
            type: string
        - name: tval
          in: query
          description: Value of the device tag, which should be considered for the query
          schema:
            type: string
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/device"
              example:
                - id: 6fd30d900f1644e88d59fd139cd239a1
                  manufacturer: Philips
                  version: "2.0"
                  product: Hue.Philips
                  serialNumber: "00:17:88:01:00:c1:ba:e8-0b"
                  type: ColorLight
                  config:
                    activityLogActive: true
                    friendlyName: Hue bloom 1
                    modelId: LLC012
                    name: Hue bloom 1
                    protocolId: Virtual
                    timeOfAcceptance: "2018-01-18T11:58:15Z"
                    timeOfDiscovery: "2018-01-18T11:42:46Z"
                  tags:
                    type: TDecorationalLightId
                    typeCategory: TCLightId
                  capabilities:
                    - /capability/1fe86e17c5d54c34913b2e2b1f420a49
                    - /capability/3367d160b3194febb614e39d76a1d0fb
                    - /capability/91458ea2ee5c4721ad767b2a0ba3d241
    post:
      tags:
        - Device
      summary: Stores a device in the SmartHome configuration
      description: "__IMPORTANT__: No other requests that needs exclusive access to the configuration should be sent until one of the above notification is received since the system will reject such requests"
      operationId: postDevice
      requestBody:
        description: The device entity to be created
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/device"
            example:
              $ref: "#/components/examples/deviceExample/value"
      responses:
        200:
          description: The request has been received and validated (acknowledge response), but it doesnâ€™t mean that the result was successful. The 200 OK request response will always be followed by an event received through the websocket connection containing the actual result state (detailed)
        400:
          description: If the device is not valid from the attributes point of view (missing required attributes, invalid types) the 3001 error code is retrieved. If the device has missing or wrong values for a specific property of that device instance the 1005 error code is retrieved.
  device_id:
    parameters:
      - name: id
        in: path
        description: ID of the referred device
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Device
      summary: Find device by ID
      description: The device with the device id {id} is returned.
      operationId: getDeviceById
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/device"
              example:
                $ref: "#/components/examples/deviceExample/value"
        400:
          description: Invalid ID supplied
          content: {}
        404:
          description: Device not found
          content: {}
    delete:
      tags:
        - Device
      summary: Deletes a device from the SmartHome configuration
      description: "__IMPORTANT__: No other requests that needs exclusive access to the configuration should be sent until one of the above notification is received since the system will reject such requests"
      operationId: deleteDevice
      responses:
        200:
          description: The request has been received and validated (acknowledge response), but it doesnâ€™t mean that the result was successful. The 200 OK request response will always be followed by an event received through the websocket connection containing the actual result state (detailed)
        400:
          description: Invalid ID supplied
        404:
          description: Device not found
    put:
      tags:
        - Device
      summary: Updates a device in the SmartHome configuration
      description: |
        Usage of the PUT Device interface should follow the next process:
          1.  Use GET Device interface to obtain a device entity
          2.  Update the desired device properties of the entity obtained in step 1
          3.  Use PUT Device with the result from step 2 in the body of the request
      operationId: updateDevice
      requestBody:
        description: |
          Device entity to be updated

          __IMPORTANT:__ The body of the request is mandatory to be a full device entity, containing both updated and unchanged properties. PUT Device should work only with entities obtained through the GET Device interface.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/device"
            example:
              $ref: "#/components/examples/deviceExample/value"
        required: true
      responses:
        200:
          description: The request has been received and validated (acknowledge response), but it doesnâ€™t mean that the result was successful. The 200 OK request response will always be followed by an event received through the websocket connection containing the actual result state (detailed).
        400:
          description: If the device is not valid from the attributes point of view (missing required attributes, invalid types) the 3001 error code is retrieved. If the device has missing or wrong values for a specific property of that device instance the 1005 error code is retrieved.
components:
  schemas:
    device:
      type: object
      description: Device entity
      properties:
        manufacturer:
          type: string
          readOnly: true
          description: Identifier of the device manufacturer
        type:
          type: string
          readOnly: true
          description: "Specifies the type of the device, which is defined by the manufacturer. The triple of device type, manufacturer and the version must be unique."
        version:
          type: string
          readOnly: true
          description: Version number of the device for the domain model. If the functionality of the device changes, the version must be increased to indicate that there are new or changed attributes of the device.
        product:
          type: string
          readOnly: true
          description: "Defines the product, which is used as an identifier for selecting the right add-in to support the functionality of the device. Remark: one add-in can support multiple devices, e.g. core.RWE, which supports all RWE hardware devices (also referred to as core devices)."
        serialNumber:
          type: string
          readOnly: true
          description: Device serial number
        id:
          type: string
          readOnly: true
          description: Unique id for the device
        location:
          type: string
          pattern: "^(\\/location\\/(\\w+)$)"
          description: "The location contains the link to the location of the device."
        config:
          type: object
          description: "This represents a container of all configuration properties like firmware version of the device. Configuration parameters are usually properties of the device, which change not frequently."
        volatile:
          type: object
          description: "This represents a container (similar to Config) of the write-only configuration properties which are configuration properties that a device needs (i.e. for inclusion) and they should not be further retrieved to the client. For example the inclusion key for wMBus devices is needed only in the inclusion phase and should be empty when retrieved."
        tags:
          type: object
          description: "The tag container can contain any number of properties for grouping of the devices in the client, e.g. category of device like â€œsecurity relatedâ€. The tags can be freely chosen by the client and will not be considered by the system for any business logic."
          additionalProperties:
            type: string
        capabilities:
          description: "Contain a list of the device capabilities."
          readOnly: true
          type: array
          items:
            type: string
            pattern: "^(\\/capability\\/(\\w+)$)"
      required:
        - manufacturer
        - type
        - version
        - product
        - serialNumber
  examples:
    deviceExample:
      value:
        id: 6fd30d900f1644e88d59fd139cd239a1
        manufacturer: Philips
        version: "2.0"
        product: Hue.Philips
        serialNumber: "00:17:88:01:00:c1:ba:e8-0b"
        type: ColorLight
        config:
          activityLogActive: true
          friendlyName: Hue bloom 1
          modelId: LLC012
          name: Hue bloom 1
          protocolId: Virtual
          timeOfAcceptance: "2018-01-18T11:58:15Z"
          timeOfDiscovery: "2018-01-18T11:42:46Z"
        tags:
          type: TDecorationalLightId
          typeCategory: TCLightId
        capabilities:
          - /capability/1fe86e17c5d54c34913b2e2b1f420a49
          - /capability/3367d160b3194febb614e39d76a1d0fb
          - /capability/91458ea2ee5c4721ad767b2a0ba3d241
