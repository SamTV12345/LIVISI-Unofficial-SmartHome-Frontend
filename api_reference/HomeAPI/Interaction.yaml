paths:
  interaction:
    get:
      tags:
        - Interaction
      summary: Retrieves one or multiple interactions
      description: |
        The interface returns one or many interaction entities connected to
        the concerned SmartHome controller. Optionally, the retrieval can be restricted
        to a certain tag by specifying the key of the tag and the corresponding tag value. When using this interface without a parameter, the interface response can grow large, since it will include a full list of all attached devices to a controller. Parameter values has to be URL encoded.
      operationId: getInteraction
      parameters:
        - name: tkey
          in: query
          description:
            Key of the interaction tag relevant for the search. In case this parameter
            is specified also the value for the tag must be provided
          schema:
            type: string
        - name: tval
          in: query
          description: Value of the interaction tag, which should be considered for the query
          schema:
            type: string
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/interaction"
              example:
                - id: d51fab5278af4767b369a792b68aaf89
                  name: My interaction
                  created: '2017-09-06T07:45:32'
                  modified: '2017-09-06T07:45:32'
                  freezeTime: 0
                  validFrom: '2017-09-06T07:45:32'
                  validTo: '2018-09-06T07:45:32'
                  rules:
                    - id: 412b741a81a94cc9943bc6f57c773581
                      conditionsEvaluationDelay: 5
                      triggers:
                        - type: Event
                          source: /capability/c28700f45098450eb2411a5bb579cf4d
                          eventType: StateChanged
                          conditions: []
                      constraints:
                        - type: Equal
                          params:
                            leftOp:
                              type: Constant
                              value: true
                            rightOp:
                              type: GetEntityStateProperty
                              params:
                                entityId:
                                  type: Constant
                                  value: /capability/bda999d2c7934918a88114216ed777d0
                                targetPropertyName:
                                  type: Constant
                                  value: value
                      actions:
                        - type: Toggle
                          namespae: VariableActuator.RWE
                          target: /capability/bda999d2c7934918a88114216ed777d0
    post:
      tags:
        - Interaction
      summary: Stores an interaction in the SmartHome configuration
      description: "__IMPORTANT__: No other requests that needs exclusive access to the configuration should be sent until one of the above notification is received since the system will reject such requests"
      operationId: postInteraction
      requestBody:
        description: The interaction entity to be created
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/interaction"
            example:
              $ref: "#/components/examples/interactionExample/value"
      responses:
        200:
          description: The request has been received and validated (acknowledge response), but it doesn’t mean that the result was successful. The 200 OK request response will always be followed by an event received through the websocket connection containing the actual result state (detailed)
        400:
          description: If the interaction is not valid from the attributes point of view (missing required attributes, invalid types) the 3001 error code is retrieved. If the interaction has missing or wrong values for a specific property of that interaction instance the 1005 error code is retrieved.
  interaction_id:
    parameters:
      - name: id
        in: path
        description: ID of the referred interaction
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Interaction
      summary: Find interaction by ID
      description: The interaction with the interaction id {id} is returned.
      operationId: getInteractionById
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/interaction"
              example:
                $ref: "#/components/examples/interactionExample/value"
        400:
          description: Invalid ID supplied
          content: {}
        404:
          description: Interaction not found
          content: {}
    delete:
      tags:
        - Interaction
      summary: Deletes an interaction from the SmartHome configuration
      description: "__IMPORTANT__: No other requests that needs exclusive access to the configuration should be sent until one of the above notification is received since the system will reject such requests"
      operationId: deleteInteraction
      responses:
        200:
          description: The request has been received and validated (acknowledge response), but it doesn’t mean that the result was successful. The 200 OK request response will always be followed by an event received through the websocket connection containing the actual result state (detailed)
        400:
          description: Invalid ID supplied
        404:
          description: Interaction not found
    put:
      tags:
        - Interaction
      summary: Updates an interaction in the SmartHome configuration
      description: |
        Usage of the PUT Interaction interface should follow the next process:
          1.  Use GET Interaction interface to obtain an interaction entity
          2.  Update the desired interaction properties of the entity obtained in step 1
          3.  Use PUT Interaction with the result from step 2 in the body of the request
      operationId: updateInteraction
      requestBody:
        description: |
          Interaction entity to be updated

          __IMPORTANT:__ The body of the request is mandatory to be a full interaction entity, containing both updated and unchanged properties. PUT interaction should work only with entities obtained through the GET interaction interface.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/interaction"
            example:
              $ref: "#/components/examples/interactionExample/value"
        required: true
      responses:
        200:
          description: The request has been received and validated (acknowledge response), but it doesn’t mean that the result was successful. The 200 OK request response will always be followed by an event received through the websocket connection containing the actual result state (detailed).
        400:
          description: If the interaction is not valid from the attributes point of view (missing required attributes, invalid types) the 3001 error code is retrieved. If the interaction has missing or wrong values for a specific property of that interaction instance the 1005 error code is retrieved.
components:
  schemas:            
    eventTrigger:
      description: Event trigger entity. 
      type: object
      properties:
        type:
          description: Specifies the type of the trigger. Must be always “Event”
          type: string
          readOnly: false
          const: Event
        eventType:
          type: string
          readOnly: false
          description: Type of the event, which is the basis for the trigger. The source represents the reference to the entity that is expected to issue the event
        source:
          $ref: "Link.yaml#/components/schemas/link"
        conditions:
          description: One or many conditions, which are applied to the event data to decide whether the trigger “fires”. Only Boolean functions are accepted as conditions.
          type: array
          items:
            $ref: "Function.yaml#/components/schemas/function"
        tags:
          description: One or more tags, for identifying the Trigger
          type: object
          additionalProperties:
            type: string
      required:
        - type
        - eventType
        - source
    customTrigger:
      description: Custom trigger entity      
      type: object
      properties:
        type:
          description: Specifies the type of the trigger. Must be always “Custom”
          type: string
          readOnly: false
          const: Custom
        subtype:
          type: string
          readOnly: false
          description: A subtype of the trigger defined in the context of the add-in/logic which evaluates it
        namespace: 
          type: string
          description: The product (context) that issues the trigger. The source field is a reference to the entity that evaluates the trigger
        source:
          $ref: "Link.yaml#/components/schemas/link"
        properties:
          description: Container of configuration properties which are interpreted by the trigger evaluator (i.e. context product)
          type: object
          additionalProperties:
            type: string
        tags:
          description: One or more tags, for identifying the Trigger        
          type: object
          additionalProperties:
            type: string
      required:
        - type
        - subtype
        - source
    rule:
      type: object
      description: Rule entity
      properties:
        id:
          type: string
          readOnly: false
          description: Rule identifier
        conditionEvaluationDelay:
          type: integer
          readOnly: false
          description: A delay in seconds, after which the rule constraints shall be evaluated
        triggers:
          description: Container for the triggers of the rule
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/eventTrigger"            
              - $ref: "#/components/schemas/customTrigger"            
        constraints:
          description: Container for the Conditions for the execution of the rule
          items:
            oneOf:
              - $ref: "Constant.yaml#/components/schemas/constant"
              - $ref: "Function.yaml#/components/schemas/function"
        actions:
          description: Container for the intended device actions, which should be performed if the rule evaluates to “True”
          type: array
          items:
            $ref: "Action.yaml#/components/schemas/action"
        tags:
          description: Container for tagging the rule, e.g. RuleCategory=“Predefined”
          type: object
          additionalProperties:
            type: string
      required:
        - id
    interaction:
      type: object
      description: An interaction is an overarching container for one or many rules. An Interaction is on the root level and can be retrieved and modified without underlying entity.
      properties:
        id:
          type: string
          readOnly: false
          description: The unique identifier of the interaction 
        name:
          type: string
          readOnly: false
          description: Interaction name
        created:
          type: string
          format: date-time
          readOnly: false
          description: Timestamp when the interaction has been created
        modified:
          type: string
          format: date-time
          readOnly: false
          description: Timestamp when the interaction has been last modified
        validFrom:
          type: string
          format: date-time
          readOnly: false
          description: Timestamp indicating from which point in time the interaction is active (if the value is not specified or null, the interaction will be active)
        validTo:
          type: string
          format: date-time
          readOnly: false
          description: Timestamp indicating until which point in time the interaction is active
        freezeTime:
          type: integer
          readOnly: false
          description: After the execution of a rule, the parent interaction can enter a "freeze mode" for a well-defined period, which is configurable. During this mode, none of the interaction’s rules is evaluated/executed. The interaction behaves as if it were inactive. Freezetime represents the number of seconds until the interaction in inactive.
        isInternal:
          type: boolean
          readOnly: true
          description: Flags set to ‘true’ for interactions that are created automatically and cannot be altered by the user.
        rules:
          description: Container of Rules of the interaction
          type: array
          items:
            $ref: "#/components/schemas/rule"
        tags:
          description: Container of Property for tagging the interaction, e.g. ScenarioType=“Alarm Interaction”
          type: object
          additionalProperties:
            type: string
      required:
        - id
        - created
        - modified
        - rules
  examples:
    interactionExample:
      value:
        id: d51fab5278af4767b369a792b68aaf89
        name: My interaction
        created: '2017-09-06T07:45:32'
        modified: '2017-09-06T07:45:32'
        freezeTime: 0
        validFrom: '2017-09-06T07:45:32'
        validTo: '2018-09-06T07:45:32'
        rules:
          - id: 412b741a81a94cc9943bc6f57c773581
            conditionsEvaluationDelay: 5
            triggers:
              - type: Event
                source: /capability/c28700f45098450eb2411a5bb579cf4d
                eventType: StateChanged
                conditions: []
            constraints:
              - type: Equal
                params:
                  leftOp:
                    type: Constant
                    value: true
                  rightOp:
                    type: GetEntityStateProperty
                    params:
                      entityId:
                        type: Constant
                        value: /capability/bda999d2c7934918a88114216ed777d0
                      targetPropertyName:
                        type: Constant
                        value: value
            actions:
              - type: Toggle
                namespae: VariableActuator.RWE
                target: /capability/bda999d2c7934918a88114216ed777d0              
 
